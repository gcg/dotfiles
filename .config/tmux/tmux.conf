set -g default-command ${SHELL}
set -g default-shell ${SHELL}

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-features ',*:Smulx=\E[4::%p1%dm'
set -as terminal-features ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind c new-window      -c "#{pane_current_path}"
bind '"' split-window  -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind R source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded."

set -g mouse on
set -g history-limit 50000
set -sg escape-time 10
set -g focus-events on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-keys vi
set -g status-justify centre
set -g allow-passthrough on
set-window-option -g mode-keys vi
set-window-option -g automatic-rename on
set-window-option -g aggressive-resize on

set-hook -g client-dark-theme 'set -g @ukiyo-theme "kanagawa/dragon" ; source-file ~/.config/tmux/tmux.conf'
set-hook -g client-light-theme 'set -g @ukiyo-theme "kanagawa/lotus" ; source-file ~/.config/tmux/tmux.conf'
set -g @ukiyo-plugins "battery cpu-usage time"
set -g @ukiyo-show-powerline false
set -g @ukiyo-show-flags true
set -g @ukiyo-ignore-window-colors true
set -g @ukiyo-left-icon session
set -g @ukiyo-military-time true
set -g @ukiyo-show-timezone false

set -g @resurrect-processes 'false'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'RyanMacG/tpm-redux'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'Nybkox/tmux-ukiyo'
# tmux-continuum must be last: themes can overwrite status-right and break autosave
set -g @plugin 'tmux-plugins/tmux-continuum'

run '~/.config/tmux/plugins/tpm-redux/tpm'

