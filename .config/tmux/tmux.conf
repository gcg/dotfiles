# terminal
set -g  default-terminal "tmux-256color"

# behaviour
set -g  mouse on
set -g  base-index 1
set -g  pane-base-index 1
set -g  renumber-windows on
set -g  status-keys vi
set -g  status-justify centre
set -g  allow-passthrough on
setw -g mode-keys vi
setw -g automatic-rename on

# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# keys
bind c   new-window     -c "#{pane_current_path}"
bind '"' split-window   -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"
bind R   source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded."

## mouse wheel scroll settings 
bind-key -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down

# ukiyo theme
set -g @ukiyo-plugins              "battery cpu-usage time"
set -g @ukiyo-show-powerline       false
set -g @ukiyo-show-flags           true
set -g @ukiyo-ignore-window-colors true
set -g @ukiyo-left-icon            session
set -g @ukiyo-military-time        true
set -g @ukiyo-show-timezone        false

set-hook -g client-dark-theme {
  set -g @ukiyo-theme "kanagawa/dragon"
  run ~/.config/tmux/plugins/tmux-ukiyo/ukiyo.tmux
}
set-hook -g client-light-theme {
  set -g @ukiyo-theme "kanagawa/lotus"
  run ~/.config/tmux/plugins/tmux-ukiyo/ukiyo.tmux
}

# resurrect / continuum
set -g @resurrect-processes     'false'
set -g @continuum-restore       'on'
set -g @continuum-save-interval '5'

# plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"

set -g @plugin 'RyanMacG/tpm-redux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'Nybkox/tmux-ukiyo'
# tmux-continuum must be last: themes can overwrite status-right and break autosave
set -g @plugin 'tmux-plugins/tmux-continuum'

run ~/.config/tmux/plugins/tpm-redux/tpm
